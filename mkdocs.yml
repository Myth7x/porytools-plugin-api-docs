site_name: Porytools Plugin API Docs
site_url: https://myth7x.github.io/porytools-plugin-api-docs/
repo_url: https://github.com/Myth7x/porytools-plugin-api-docs

# The Markdown sources live at the repository root (index.md, plugins/**),
# not in a docs/ subfolder — so point docs_dir at the root.
#
# Consequence: MkDocs refuses to build when site_dir sits inside docs_dir,
# and the default site_dir ("site") would be inside the root. So the build
# must write its output OUTSIDE the repo. CI does this with
#   mkdocs build -d "$RUNNER_TEMP/site"
# For a local one-off build, use e.g.  mkdocs build -d ../site
# (mkdocs serve works as-is — it uses its own temp dir.)
docs_dir: .

# Keep `mkdocs build --strict` from erroring on non-page files at the root.
# README.md would otherwise clash with index.md; the rest aren't docs pages.
exclude_docs: |
  README.md
  requirements.txt
  mkdocs.yml

theme:
  name: material
