site_name: Porytools Plugin API Docs
site_url: https://myth7x.github.io/porytools-plugin-api-docs/
repo_url: https://github.com/Myth7x/porytools-plugin-api-docs

# Markdown sources live in docs/ (the MkDocs default), the build output
# goes to site/, and this config sits at the repo root next to them.

theme:
  name: material
  features:
    # Let plugins/index.md serve as the clickable "Plugins" section landing
    # page instead of appearing as a duplicate child entry.
    - navigation.indexes

# Explicit sidebar. Lua API is its own top-level section rather than being
# nested under Plugins. Pages listed without a label inherit their H1.
nav:
  - index.md
  - Plugins:
      - plugins/index.md
      - plugins/quickstart.md
      - plugins/manifest.md
      - plugins/multi-file.md
      - plugins/cookbook.md
      - plugins/examples.md
      - plugins/errors.md
  - Lua API:
      - plugins/api/editor.md
      - plugins/api/file.md
      - plugins/api/project.md
      - plugins/api/cmd.md
      - plugins/api/tabs.md
      - plugins/api/ui.md

# Extensions the docs actually rely on:
#   attr_list + md_in_html   -> grid cards and { .lg .middle } icon sizing
#   pymdownx.emoji           -> :material-*: / :octicons-*: icons
#   admonition + details     -> !!! info / ??? collapsible callouts
#   highlight + superfences  -> ```lua / ```json fenced code with highlighting
#   tables / toc             -> Markdown tables and heading permalinks
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
