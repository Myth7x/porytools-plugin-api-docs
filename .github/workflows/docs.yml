name: Deploy docs

# Build and deploy the pydoctor API reference to GitHub Pages.
# Triggers on pushes to master that touch the pt/ stub package, the config, or
# this workflow. Can also be run manually from the Actions tab.

on:
  push:
    branches:
      - master
    paths:
      - 'pt/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-progress deployment at a time.
# Don't cancel a running one — finish it, then queue the next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pydoctor
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build site
        # Config (output dir, docformat, warnings-as-errors) lives in
        # pyproject.toml under [tool.pydoctor]. warnings-as-errors mirrors
        # the old `mkdocs build --strict`.
        run: pydoctor

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
