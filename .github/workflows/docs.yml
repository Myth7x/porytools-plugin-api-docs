name: Deploy docs

# Build and deploy the MkDocs Material site at https://myth7x.github.io/porytools/.
# Triggers on pushes to master that touch the docs, the config, or this workflow.
# Can also be run manually from the Actions tab.

on:
  push:
    branches:
      - master
    paths:
      - 'index.md'
      - 'plugins/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-progress deployment at a time.
# Don't cancel a running one — finish it, then queue the next.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Needed so mkdocs can show "last modified" dates if the
          # git-revision-date plugin is later enabled.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build site
        # Build outside the repo root: docs_dir is the root, and MkDocs
        # refuses to write site_dir into docs_dir.
        run: mkdocs build --strict -d "$RUNNER_TEMP/site"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
